name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
      - name: Build & Install
        run: mvn -B install -D skipTests --no-transfer-progress
      - name: Ensure browsers are installed
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps"
      - name: Run tests
        run: mvn test "-Dtest=!LocalHtmlFrameTest,!YandexSearchTest,!WebSocketTest,!WaitingTest,!ScreenShotWhenFailTest,!ModernAssertionsTest,!AssertionTest,!ErrorAndExceptionsTest"

      - name: Add Allure environment info
          if: always()
          run: |
            mkdir -p /allure-results
            cat > /allure-results/environment.properties <<EOF
            Environment=CI
            OS=Ubuntu Linux
            Java.Version=${{ steps.java.outputs.version }}
            CI.System=GitHub Actions
            Browser=Chromium
            EOF
      - name: Generate Allure Report
        if: always()
        run: |
          mvn allure:report -B
      - name: Upload Allure Report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-reports
          retention-days: 30
