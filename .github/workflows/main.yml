name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        id: java
        with:
          distribution: "temurin"
          java-version: "25"
          cache: maven
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Build & Install
        run: mvn -B install -D skipTests --no-transfer-progress
      - name: Ensure browsers are installed
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps"
      - name: Run tests
        env:
          ENV: dev
        run: mvn test "-Dtest=!CheckboxTest,!LocalHtmlFrameTest,!YandexSearchTest,!WebSocketTest,!ScreenShotWhenFailTest,!ModernAssertionsTest,!AssertionTest,!ErrorAndExceptionsTest"

      - name: Add Allure environment info
        if: always()
        run: |
          mkdir -p target/allure-results
          {
            echo "Environment=CI"
            echo "OS=Ubuntu Linux"
            echo "Java.Version=${{ steps.java.outputs.version }}"
            echo "CI.System=GitHub Actions"
            echo "Browser=Chromium"
          } > target/allure-results/environment.properties
      - name: Generate Allure Report
        if: always()
        run: |
          mvn allure:report -B
      - name: Upload Allure Report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-reports
          retention-days: 30

      - name: Upload screenshots and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-videos
          path: |
            target/screenshots/
            target/videos/
          if-no-files-found: ignore

      - name: Upload trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: target/traces/
